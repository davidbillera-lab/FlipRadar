<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlipRadar — Route Planner</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111a2e;
        --border: #1f2a44;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-hover: #0ea5e9;
        --good: #34d399;
        --warn: #fbbf24;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        grid-template-columns: 420px 1fr;
        grid-template-rows: 56px 1fr;
        grid-template-areas: "header header" "sidebar map";
        height: 100vh;
      }
      header {
        grid-area: header;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      header a {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
      }
      header a:hover { color: var(--accent); }
      #sidebar {
        grid-area: sidebar;
        overflow-y: auto;
        padding: 16px;
        border-right: 1px solid var(--border);
      }
      #map { grid-area: map; }
      .controls {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 14px;
      }
      .controls label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .controls input[type="text"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 14px;
      }
      .controls input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        background: var(--accent);
        color: #001017;
        border: none;
        padding: 9px 14px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { background: var(--accent-hover); }
      button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
      button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      button.secondary:hover { border-color: var(--accent); color: var(--accent); }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      .row > button { flex: 1; }
      .summary {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 14px;
        font-size: 13px;
      }
      .summary .stat {
        display: inline-block;
        margin-right: 16px;
      }
      .summary .stat b { color: var(--accent); font-size: 15px; }
      .sale {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: border-color .12s;
        position: relative;
      }
      .sale:hover { border-color: var(--accent); }
      .sale.selected { border-color: var(--good); background: rgba(52, 211, 153, .06); }
      .sale .order-badge {
        position: absolute;
        top: 10px; right: 10px;
        background: var(--accent);
        color: #001017;
        font-weight: 700;
        font-size: 11px;
        width: 22px; height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sale .title {
        font-weight: 600;
        margin-bottom: 4px;
        padding-right: 30px;
      }
      .sale .addr { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
      .sale .actions { display: flex; gap: 10px; align-items: center; font-size: 12px; }
      .sale .actions a {
        color: var(--accent);
        text-decoration: none;
      }
      .sale .actions a:hover { text-decoration: underline; }
      .sale input[type="checkbox"] { margin-right: 6px; vertical-align: middle; }
      .empty { color: var(--muted); padding: 24px; text-align: center; }
      .error {
        background: rgba(251, 191, 36, .1);
        border: 1px solid var(--warn);
        color: var(--warn);
        padding: 10px 12px;
        border-radius: 6px;
        margin-bottom: 14px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>FlipRadar — Route Planner</h1>
      <a href="/">← back to dashboard</a>
    </header>
    <div id="sidebar">
      <div class="controls">
        <label for="start">Starting Address</label>
        <input id="start" type="text" placeholder="123 Main St, Denver, CO" autocomplete="off" />
        <div class="row">
          <button id="optimize">Optimize Route</button>
          <button id="reset" class="secondary">Reset</button>
        </div>
      </div>
      <div id="error" class="error" style="display:none"></div>
      <div id="summary" class="summary" style="display:none"></div>
      <div id="sales"></div>
    </div>
    <div id="map"></div>

    <script>
      const API_KEY = "__GOOGLE_MAPS_API_KEY__";
      let map, directionsRenderer, startMarker;
      let allSales = [];        // every garage sale we know about
      const selectedIds = new Set(); // empty = "all eligible"
      let optimized = null;     // last server response

      // --- bootstrap ---
      function loadGmaps() {
        return new Promise((resolve, reject) => {
          if (window.google && window.google.maps) return resolve();
          const s = document.createElement("script");
          s.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker,places,geometry`;
          s.async = true;
          s.onload = () => resolve();
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      async function fetchSales() {
        const r = await fetch("/api/trpc/garageSales.list?batch=1&input=" + encodeURIComponent(JSON.stringify({ "0": { json: {} } })));
        const j = await r.json();
        const payload = j?.[0]?.result?.data?.json ?? {};
        const rows = payload.rows ?? payload.sales ?? [];
        return rows.filter((s) => s.lat != null && s.lng != null);
      }

      function renderSales() {
        const root = document.getElementById("sales");
        if (!allSales.length) {
          root.innerHTML = '<div class="empty">No geocoded garage sales yet. Run the scraper from the dashboard first.</div>';
          return;
        }
        const orderById = new Map();
        if (optimized?.orderedWaypoints) {
          optimized.orderedWaypoints.forEach((w, i) => orderById.set(w.id, i + 1));
        }
        const sortedSales = optimized
          ? [...allSales].sort((a, b) => (orderById.get(a.id) ?? 9999) - (orderById.get(b.id) ?? 9999))
          : allSales;
        root.innerHTML = sortedSales
          .map((s) => {
            const checked = selectedIds.size === 0 || selectedIds.has(s.id) ? "checked" : "";
            const cls = (selectedIds.size === 0 || selectedIds.has(s.id)) ? "sale selected" : "sale";
            const ord = orderById.get(s.id);
            const badge = ord ? `<div class="order-badge">${ord}</div>` : "";
            const platformLabel = s.platform === "facebook" ? "Facebook" : "Craigslist";
            return `
              <div class="sale ${cls === 'sale selected' ? 'selected' : ''}" data-id="${s.id}">
                ${badge}
                <div class="title">
                  <input type="checkbox" data-id="${s.id}" ${checked} />
                  ${escapeHtml(s.title)}
                </div>
                ${s.address ? `<div class="addr">${escapeHtml(s.address)}</div>` : ""}
                <div class="actions">
                  <a href="${escapeAttr(s.sourceUrl)}" target="_blank" rel="noopener">Open on ${platformLabel} ↗</a>
                </div>
              </div>`;
          })
          .join("");

        root.querySelectorAll('input[type="checkbox"]').forEach((box) => {
          box.addEventListener("change", (e) => {
            const id = e.target.getAttribute("data-id");
            // First interaction: convert "all" (empty set) to explicit set of all ids.
            if (selectedIds.size === 0) {
              allSales.forEach((s) => selectedIds.add(s.id));
            }
            if (e.target.checked) selectedIds.add(id);
            else selectedIds.delete(id);
            renderSales();
            renderMarkers();
          });
        });
      }

      let markerObjs = [];
      function clearMarkers() {
        markerObjs.forEach((m) => m.setMap(null));
        markerObjs = [];
      }
      function renderMarkers() {
        if (!map) return;
        clearMarkers();
        const bounds = new google.maps.LatLngBounds();
        const targets = (selectedIds.size === 0)
          ? allSales
          : allSales.filter((s) => selectedIds.has(s.id));
        targets.forEach((s) => {
          const m = new google.maps.Marker({
            position: { lat: Number(s.lat), lng: Number(s.lng) },
            map,
            title: s.title,
          });
          m.addListener("click", () => window.open(s.sourceUrl, "_blank"));
          markerObjs.push(m);
          bounds.extend(m.getPosition());
        });
        if (startMarker) bounds.extend(startMarker.getPosition());
        if (!bounds.isEmpty()) map.fitBounds(bounds, 60);
      }

      async function runOptimize() {
        const startAddress = document.getElementById("start").value.trim();
        if (!startAddress) {
          showError("Enter a starting address first.");
          return;
        }
        showError("");
        document.getElementById("optimize").disabled = true;
        document.getElementById("optimize").textContent = "Optimizing…";
        try {
          const saleIds = selectedIds.size === 0 ? undefined : [...selectedIds];
          const res = await fetch("/api/route/optimize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ startAddress, saleIds }),
          });
          const j = await res.json();
          if (!j.ok) {
            showError(j.error || "Optimization failed.");
            return;
          }
          optimized = j;
          renderSummary(j);
          renderSales();
          drawRoute(j, startAddress);
          // Cache start address for next visit.
          localStorage.setItem("fr_start_address", startAddress);
        } catch (e) {
          showError(e.message || "Network error.");
        } finally {
          document.getElementById("optimize").disabled = false;
          document.getElementById("optimize").textContent = "Optimize Route";
        }
      }

      function renderSummary(j) {
        const miles = (j.totalDistanceMeters / 1609.34).toFixed(1);
        const mins = Math.round(j.totalDurationSeconds / 60);
        document.getElementById("summary").style.display = "block";
        document.getElementById("summary").innerHTML = `
          <div class="stat"><b>${j.orderedWaypoints.length}</b> stops</div>
          <div class="stat"><b>${miles}</b> mi</div>
          <div class="stat"><b>${mins}</b> min driving</div>
          <div style="margin-top:10px">
            <a href="${j.googleMapsUrl}" target="_blank" rel="noopener" style="color:var(--accent)">Open turn-by-turn in Google Maps ↗</a>
          </div>`;
      }

      function drawRoute(j, startAddress) {
        if (!map) return;
        if (startMarker) startMarker.setMap(null);
        startMarker = new google.maps.Marker({
          position: { lat: j.startLat, lng: j.startLng },
          map,
          title: "Start: " + (j.startFormatted || startAddress),
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 9,
            fillColor: "#34d399",
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 2,
          },
          zIndex: 999,
        });

        if (!directionsRenderer) {
          directionsRenderer = new google.maps.DirectionsRenderer({
            map,
            suppressMarkers: false,
            polylineOptions: { strokeColor: "#38bdf8", strokeWeight: 4, strokeOpacity: 0.85 },
          });
        }
        const waypoints = j.orderedWaypoints.map((w) => ({
          location: { lat: w.lat, lng: w.lng },
          stopover: true,
        }));
        new google.maps.DirectionsService().route(
          {
            origin: { lat: j.startLat, lng: j.startLng },
            destination: { lat: j.startLat, lng: j.startLng },
            waypoints,
            optimizeWaypoints: false, // already optimized server-side
            travelMode: google.maps.TravelMode.DRIVING,
          },
          (resp, status) => {
            if (status === "OK") directionsRenderer.setDirections(resp);
            else showError("Map render failed: " + status);
          },
        );
      }

      function showError(msg) {
        const el = document.getElementById("error");
        if (!msg) { el.style.display = "none"; el.textContent = ""; return; }
        el.style.display = "block";
        el.textContent = msg;
      }

      function escapeHtml(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      }
      function escapeAttr(s) {
        return escapeHtml(s).replaceAll('"', "&quot;");
      }

      (async function init() {
        if (!API_KEY) {
          showError("GOOGLE_MAPS_API_KEY is not set in .env.");
          return;
        }
        try {
          await loadGmaps();
        } catch {
          showError("Could not load Google Maps. Check the JS console.");
          return;
        }
        map = new google.maps.Map(document.getElementById("map"), {
          zoom: 11,
          center: { lat: 39.7392, lng: -104.9903 }, // Denver
          mapTypeControl: false,
          streetViewControl: false,
        });
        try {
          allSales = await fetchSales();
        } catch (e) {
          showError("Could not load garage sales: " + e.message);
          return;
        }
        renderSales();
        renderMarkers();

        // Restore previous start address.
        const saved = localStorage.getItem("fr_start_address");
        if (saved) document.getElementById("start").value = saved;

        document.getElementById("optimize").addEventListener("click", runOptimize);
        document.getElementById("reset").addEventListener("click", () => {
          optimized = null;
          selectedIds.clear();
          if (directionsRenderer) directionsRenderer.set("directions", null);
          if (startMarker) { startMarker.setMap(null); startMarker = null; }
          document.getElementById("summary").style.display = "none";
          showError("");
          renderSales();
          renderMarkers();
        });
      })();
    </script>
  </body>
</html>
